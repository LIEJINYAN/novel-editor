<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#89b4fa" />
    <meta name="description" content="一款现代化的小说编辑器，结合富文本编辑与AI辅助写作" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NovelEngine" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>小说引擎编辑器</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
  </head>
  <body class="bg-editor-bg text-editor-text">
    <div id="root"></div>
    <script>
      // Skip-to-content link for keyboard users
      document.addEventListener('DOMContentLoaded', function() {
        var skipLink = document.createElement('a');
        skipLink.href = '#main-content';
        skipLink.className = 'skip-to-content';
        skipLink.textContent = '跳转到主内容';
        skipLink.setAttribute('tabindex', '0');
        document.body.insertBefore(skipLink, document.body.firstChild);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
